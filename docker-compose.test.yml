services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_TEST_USER:-smartfuel_test}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-smartfuel_test}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-smartfuel_test}
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER:-smartfuel_test} -d ${POSTGRES_TEST_DB:-smartfuel_test}"]
      interval: 3s
      timeout: 3s
      retries: 15

  backend:
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://${POSTGRES_TEST_USER:-smartfuel_test}:${POSTGRES_TEST_PASSWORD:-smartfuel_test}@postgres_test:5432/${POSTGRES_TEST_DB:-smartfuel_test}
      TEST_DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_TEST_USER:-smartfuel_test}:${POSTGRES_TEST_PASSWORD:-smartfuel_test}@postgres_test:5432/${POSTGRES_TEST_DB:-smartfuel_test}
    depends_on:
      postgres_test:
        condition: service_healthy
