services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartfuel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartfuel}
      POSTGRES_DB: ${POSTGRES_DB:-smartfuel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartfuel} -d ${POSTGRES_DB:-smartfuel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: ${APP_NAME:-Inteligência Auto Postos}
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartfuel}:${POSTGRES_PASSWORD:-smartfuel}@postgres:5432/${POSTGRES_DB:-smartfuel}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-smartfuel}:${POSTGRES_PASSWORD:-smartfuel}@postgres:5432/${POSTGRES_DB:-smartfuel}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-evidences}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      XPERT_SQLSERVER_HOST: ${XPERT_SQLSERVER_HOST:-}
      XPERT_SQLSERVER_PORT: ${XPERT_SQLSERVER_PORT:-1433}
      XPERT_SQLSERVER_DATABASE: ${XPERT_SQLSERVER_DATABASE:-atxdados}
      XPERT_SQLSERVER_USER: ${XPERT_SQLSERVER_USER:-}
      XPERT_SQLSERVER_PASSWORD: ${XPERT_SQLSERVER_PASSWORD:-}
      XPERT_SQLSERVER_DRIVER: ${XPERT_SQLSERVER_DRIVER:-ODBC Driver 18 for SQL Server}
      XPERT_SQLSERVER_ENCRYPT: ${XPERT_SQLSERVER_ENCRYPT:-true}
      XPERT_SQLSERVER_TRUST_CERTIFICATE: ${XPERT_SQLSERVER_TRUST_CERTIFICATE:-true}
      XPERT_ALLOW_UNSAFE_PRIVILEGES: ${XPERT_ALLOW_UNSAFE_PRIVILEGES:-false}
      XPERT_ODBC_DRIVER: ${XPERT_ODBC_DRIVER:-ODBC Driver 18 for SQL Server}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_use_long_random_secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAMESITE: ${REFRESH_COOKIE_SAMESITE:-lax}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-5}
      LOGIN_RATE_WINDOW_SECONDS: ${LOGIN_RATE_WINDOW_SECONDS:-60}
      MINIO_QUOTE_EVIDENCE_BUCKET: ${MINIO_QUOTE_EVIDENCE_BUCKET:-quote-evidences}
      QUOTE_EVIDENCE_MAX_SIZE_MB: ${QUOTE_EVIDENCE_MAX_SIZE_MB:-10}
      QUOTE_EXPIRATION_INTERVAL_MINUTES: ${QUOTE_EXPIRATION_INTERVAL_MINUTES:-15}
      QUOTE_EXPIRATION_BATCH_SIZE: ${QUOTE_EXPIRATION_BATCH_SIZE:-500}
      QUOTE_EXPIRATION_LOCK_TIMEOUT_SECONDS: ${QUOTE_EXPIRATION_LOCK_TIMEOUT_SECONDS:-300}
      OBJECT_STORAGE_ALLOW_MEMORY_FALLBACK: ${OBJECT_STORAGE_ALLOW_MEMORY_FALLBACK:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  quote_scheduler:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.quote_scheduler"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartfuel}:${POSTGRES_PASSWORD:-smartfuel}@postgres:5432/${POSTGRES_DB:-smartfuel}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-smartfuel}:${POSTGRES_PASSWORD:-smartfuel}@postgres:5432/${POSTGRES_DB:-smartfuel}
      QUOTE_EXPIRATION_INTERVAL_MINUTES: ${QUOTE_EXPIRATION_INTERVAL_MINUTES:-15}
      QUOTE_EXPIRATION_BATCH_SIZE: ${QUOTE_EXPIRATION_BATCH_SIZE:-500}
      QUOTE_EXPIRATION_LOCK_TIMEOUT_SECONDS: ${QUOTE_EXPIRATION_LOCK_TIMEOUT_SECONDS:-300}
      OBJECT_STORAGE_ALLOW_MEMORY_FALLBACK: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  xpert_sync_worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.xpert_sync_worker"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartfuel}:${POSTGRES_PASSWORD:-smartfuel}@postgres:5432/${POSTGRES_DB:-smartfuel}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-smartfuel}:${POSTGRES_PASSWORD:-smartfuel}@postgres:5432/${POSTGRES_DB:-smartfuel}
      XPERT_SQLSERVER_HOST: ${XPERT_SQLSERVER_HOST:-}
      XPERT_SQLSERVER_PORT: ${XPERT_SQLSERVER_PORT:-1433}
      XPERT_SQLSERVER_DATABASE: ${XPERT_SQLSERVER_DATABASE:-atxdados}
      XPERT_ODBC_DRIVER: ${XPERT_ODBC_DRIVER:-ODBC Driver 18 for SQL Server}
      XPERT_SQLSERVER_USER: ${XPERT_SQLSERVER_USER:-}
      XPERT_SQLSERVER_PASSWORD: ${XPERT_SQLSERVER_PASSWORD:-}
      XPERT_SYNC_POLL_INTERVAL_SECONDS: ${XPERT_SYNC_POLL_INTERVAL_SECONDS:-15}
      XPERT_WORKER_HEARTBEAT_TIMEOUT_SECONDS: ${XPERT_WORKER_HEARTBEAT_TIMEOUT_SECONDS:-300}
      XPERT_ALLOW_UNSAFE_PRIVILEGES: ${XPERT_ALLOW_UNSAFE_PRIVILEGES:-false}
      OBJECT_STORAGE_ALLOW_MEMORY_FALLBACK: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/verify_odbc.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_APP_VERSION: ${APP_VERSION:-0.1.0}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
